name: Build H5GG Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git curl wget make \
            clang llvm lld \
            libc++-dev libc++abi-dev \
            libssl-dev \
            pkg-config \
            zip unzip xz-utils \
            fakeroot \
            dpkg-dev

      - name: Setup Theos
        env:
          THEOS: /opt/theos
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git $THEOS
          sudo chmod -R 777 $THEOS

      - name: Download iPhoneOS 13.7 SDK
        env:
          THEOS: /opt/theos
        run: |
          mkdir -p $THEOS/sdks
          cd $THEOS/sdks
          wget -q \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS13.7.sdk.tar.xz \
            -O iPhoneOS13.7.sdk.tar.xz
          tar -xJf iPhoneOS13.7.sdk.tar.xz
          rm iPhoneOS13.7.sdk.tar.xz
          ls $THEOS/sdks/

      - name: Setup arm64 cross-compiler toolchain
        env:
          THEOS: /opt/theos
        run: |
          TOOLCHAIN=$THEOS/toolchain/linux/iphone/bin
          mkdir -p $TOOLCHAIN

          # libc++ ヘッダのパスを検出
          LIBCXX=$(find /usr/lib/llvm-*/include/c++/v1 -maxdepth 0 2>/dev/null | head -1)
          if [ -z "$LIBCXX" ]; then
            LIBCXX=$(find /usr/include/c++/v1 -maxdepth 0 2>/dev/null | head -1)
          fi
          echo "libc++ include: $LIBCXX"

          # ld64.lld のパスを検出 (Apple MachO リンカー)
          LD64=$(which ld64.lld 2>/dev/null || find /usr/bin /usr/lib/llvm-*/bin -name "ld64.lld" 2>/dev/null | head -1)
          echo "ld64.lld: $LD64"

          # clang wrapper
          printf '#!/bin/bash\nexec /usr/bin/clang --target=arm64-apple-ios11.4 -isysroot /opt/theos/sdks/iPhoneOS13.7.sdk "$@"\n' \
            > $TOOLCHAIN/clang
          chmod +x $TOOLCHAIN/clang

          # clang++ wrapper — -fuse-ld=lld で ld64.lld を強制使用
          printf '#!/bin/bash\nexec /usr/bin/clang++ --target=arm64-apple-ios11.4 -isysroot /opt/theos/sdks/iPhoneOS13.7.sdk -stdlib=libc++ -isystem %s -fuse-ld=lld "$@"\n' \
            "$LIBCXX" > $TOOLCHAIN/clang++
          chmod +x $TOOLCHAIN/clang++

          # ld → ld64.lld にリンク (MachO arm64 用)
          if [ -n "$LD64" ]; then
            ln -sf "$LD64" $TOOLCHAIN/ld
            echo "ld -> ld64.lld"
          else
            # ld64.lld が無い場合は lld を直接使う
            ln -sf /usr/bin/lld $TOOLCHAIN/ld
            echo "ld -> lld (fallback)"
          fi

          ln -sf /usr/bin/llvm-ar     $TOOLCHAIN/ar
          ln -sf /usr/bin/llvm-strip  $TOOLCHAIN/strip
          ln -sf /usr/bin/llvm-ranlib $TOOLCHAIN/ranlib || true

          echo "=== Toolchain ==="
          ls -la $TOOLCHAIN

      - name: Fix OpenSSL include path for ldid
        run: |
          OSSL=$(find /usr/include -name "sha.h" | grep openssl | head -1 | xargs dirname 2>/dev/null)
          if [ -n "$OSSL" ] && [ ! -f /usr/local/include/openssl/sha.h ]; then
            sudo mkdir -p /usr/local/include/openssl
            sudo ln -sf $OSSL/* /usr/local/include/openssl/ || true
          fi

      - name: Fix deprecated module.map in SDK
        env:
          THEOS: /opt/theos
        run: |
          find $THEOS/sdks/iPhoneOS13.7.sdk -name "module.map" | while read f; do
            mv "$f" "$(dirname $f)/module.modulemap"
          done

      - name: Build .deb package
        env:
          THEOS: /opt/theos
        run: >
          make package
          ARCHS=arm64
          TARGET="iphone:13.7:11.4"
          THEOS_PLATFORM_DEB_COMPRESSION_TYPE=gzip
          DEBUG=0
          STRIP=1
          FINALPACKAGE=1
          "H5GG_CFLAGS=-fobjc-arc -fvisibility=hidden -Wno-deprecated-non-prototype -fno-modules"
          "H5GG_CCFLAGS=-fobjc-arc -fvisibility=hidden -std=c++11 -stdlib=libc++ -fno-modules -Wno-vla-cxx-extension -Wno-unused-but-set-variable"

      - name: List built packages
        run: ls -lh packages/ || echo "(empty)"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: H5GG-deb
          path: packages/*.deb
          if-no-files-found: error
