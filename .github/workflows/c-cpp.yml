name: Build H5GG Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. リポジトリをチェックアウト ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. apt パッケージのインストール ───────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git curl wget make \
            clang llvm lld \
            libssl-dev \
            pkg-config \
            zip unzip \
            fakeroot \
            dpkg-dev

      # ── 3. Theos のセットアップ ────────────────────────────────────
      - name: Setup Theos
        env:
          THEOS: /opt/theos
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git $THEOS
          sudo chmod -R 777 $THEOS

      # ── 4. iOS SDK のダウンロード ──────────────────────────────────
      - name: Download iPhoneOS 13.7 SDK
        env:
          THEOS: /opt/theos
        run: |
          mkdir -p $THEOS/sdks
          cd $THEOS/sdks
          wget -q \
            https://github.com/theos/sdks/releases/download/v1.0/iPhoneOS13.7.sdk.zip \
            -O iPhoneOS13.7.sdk.zip
          unzip -q iPhoneOS13.7.sdk.zip
          rm iPhoneOS13.7.sdk.zip
          echo "SDK list:"
          ls $THEOS/sdks/

      # ── 5. arm64 クロスコンパイラのラッパーを作成 ─────────────────
      - name: Setup arm64 cross-compiler toolchain
        env:
          THEOS: /opt/theos
        run: |
          TOOLCHAIN=$THEOS/toolchain/linux/iphone/bin
          mkdir -p $TOOLCHAIN

          # clang wrapper
          cat > $TOOLCHAIN/clang <<'WRAPPER'
          #!/bin/bash
          exec /usr/bin/clang \
            --target=arm64-apple-ios11.4 \
            -isysroot /opt/theos/sdks/iPhoneOS13.7.sdk \
            "$@"
          WRAPPER
          chmod +x $TOOLCHAIN/clang

          # clang++ wrapper
          cat > $TOOLCHAIN/clang++ <<'WRAPPER'
          #!/bin/bash
          exec /usr/bin/clang++ \
            --target=arm64-apple-ios11.4 \
            -isysroot /opt/theos/sdks/iPhoneOS13.7.sdk \
            "$@"
          WRAPPER
          chmod +x $TOOLCHAIN/clang++

          # ar / strip をllvmへリンク
          ln -sf /usr/bin/llvm-ar       $TOOLCHAIN/ar
          ln -sf /usr/bin/llvm-strip    $TOOLCHAIN/strip
          ln -sf /usr/bin/llvm-ranlib   $TOOLCHAIN/ranlib || true
          ln -sf /usr/bin/ld.lld        $TOOLCHAIN/ld     || true

          echo "Toolchain ready:"
          ls $TOOLCHAIN

      # ── 6. ldid.cpp が必要とする openssl ヘッダのパス修正 ─────────
      - name: Fix OpenSSL include path for ldid
        run: |
          # Ubuntu では openssl ヘッダがアーキテクチャ別ディレクトリにある場合がある
          if [ ! -f /usr/local/include/openssl/sha.h ]; then
            sudo mkdir -p /usr/local/include/openssl
            OSSL=$(find /usr/include -name "sha.h" | grep openssl | head -1 | xargs dirname)
            if [ -n "$OSSL" ]; then
              sudo ln -sf $OSSL/* /usr/local/include/openssl/ || true
            fi
          fi

      # ── 7. ビルド ─────────────────────────────────────────────────
      - name: Build .deb package
        env:
          THEOS: /opt/theos
        run: |
          make package \
            ARCHS=arm64 \
            TARGET="iphone:13.7:11.4" \
            THEOS_PLATFORM_DEB_COMPRESSION_TYPE=gzip \
            DEBUG=0 \
            STRIP=1 \
            FINALPACKAGE=1

      # ── 8. packages/ 以下を確認 ───────────────────────────────────
      - name: List built packages
        run: |
          echo "=== packages/ ==="
          ls -lh packages/ || echo "(empty)"

      # ── 9. .deb をアーティファクトとしてアップロード ──────────────
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: H5GG-deb
          path: packages/*.deb
          if-no-files-found: error
